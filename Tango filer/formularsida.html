<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anmälan</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; background: #f5f5f5; }
    h1 { color: #8B0000; }
    .desc { color: #555; margin-bottom: 1.5rem; }
    .card { background: white; border-radius: 8px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    label { display: block; margin-bottom: 0.3rem; font-weight: bold; font-size: 0.9rem; }
    input, select, textarea { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 1rem; }
    .radio-group, .checkbox-group { margin-bottom: 1rem; }
    .radio-group label, .checkbox-group label { font-weight: normal; display: flex; align-items: center; gap: 0.4rem; cursor: pointer; }
    .radio-group input, .checkbox-group input { width: auto; margin: 0; }
    button { background: #8B0000; color: white; border: none; padding: 0.7rem 1.5rem; border-radius: 4px; cursor: pointer; width: 100%; font-size: 1rem; }
    button:hover { background: #6a0000; }
    .status { margin-top: 1rem; text-align: center; font-size: 0.9rem; padding: 0.8rem; border-radius: 6px; }
    .ok { background: #e6f4ea; color: #2d7a3a; }
    .err { background: #fdecea; color: #c0392b; }
    #laddning { text-align: center; padding: 3rem; color: #888; }
  </style>
</head>
<body>
  <div id="laddning">⏳ Laddar formulär...</div>
  <div id="innehall" style="display:none">
    <h1 id="formTitel">Anmälan</h1>
    <p id="formDesc" class="desc"></p>
    <div class="card">
      <form id="anmalanForm" onsubmit="skickaAnmalan(event)">
        <div id="faltContainer"></div>
        <button type="submit" id="skickaBtn">Skicka anmälan</button>
      </form>
      <div id="formStatus" class="status" style="display:none"></div>
    </div>
  </div>
  <div id="ejHittat" style="display:none; text-align:center; padding:3rem;">
    <h2>😕 Formuläret hittades inte</h2>
    <p>Kontrollera att länken är korrekt.</p>
  </div>
 
  <!-- ÄNDRA DENNA URL till din hamta_formular-webhook i n8n -->
  <script>
    const HAMTA_FORMULAR_URL = 'HAMTA_FORMULAR_WEBHOOK_URL';
 
    let formData = null;
    let formId = null;
 
    async function init() {
      const params = new URLSearchParams(location.search);
      formId = params.get('form');
      if (!formId) { visaEjHittat(); return; }
 
      try {
        const res = await fetch(HAMTA_FORMULAR_URL + '?id=' + formId);
        const data = await res.json();
        if (data.error || !data.titel) { visaEjHittat(); return; }
        formData = data;
        visaFormular(data);
      } catch(e) {
        visaEjHittat();
      }
    }
 
    function visaEjHittat() {
      document.getElementById('laddning').style.display = 'none';
      document.getElementById('ejHittat').style.display = 'block';
    }
 
    function visaFormular(data) {
      document.getElementById('laddning').style.display = 'none';
      document.getElementById('innehall').style.display = 'block';
      document.getElementById('formTitel').textContent = data.titel;
      if (data.desc) document.getElementById('formDesc').textContent = data.desc;
 
      const falt = typeof data.falt_json === 'string' ? JSON.parse(data.falt_json) : (data.falt || []);
      const container = document.getElementById('faltContainer');
      container.innerHTML = '';
 
      falt.forEach((f, i) => {
        const div = document.createElement('div');
        const labelText = f.namn + (f.krav ? ' *' : '');
 
        if (f.typ === 'textarea') {
          div.innerHTML = `
            <label for="falt_${i}">${labelText}</label>
            <textarea id="falt_${i}" name="${f.namn}" rows="4" ${f.krav ? 'required' : ''}></textarea>
          `;
        } else if (f.typ === 'select') {
          const opts = (f.alternativ || []).map(a => `<option value="${a}">${a}</option>`).join('');
          div.innerHTML = `
            <label for="falt_${i}">${labelText}</label>
            <select id="falt_${i}" name="${f.namn}" ${f.krav ? 'required' : ''}>
              <option value="">– Välj –</option>${opts}
            </select>
          `;
        } else if (f.typ === 'radio') {
          const alts = (f.alternativ || []).map(a => `
            <label>
              <input type="radio" name="falt_${i}" value="${a}" ${f.krav ? 'required' : ''} />
              ${a}
            </label>`).join('');
          div.innerHTML = `<label>${labelText}</label><div class="radio-group">${alts}</div>`;
        } else if (f.typ === 'checkbox') {
          div.innerHTML = `
            <div class="checkbox-group">
              <label>
                <input type="checkbox" id="falt_${i}" name="${f.namn}" value="ja" />
                ${labelText}
              </label>
            </div>
          `;
        } else {
          div.innerHTML = `
            <label for="falt_${i}">${labelText}</label>
            <input type="${f.typ}" id="falt_${i}" name="${f.namn}" ${f.krav ? 'required' : ''} />
          `;
        }
        container.appendChild(div);
      });
 
      // Spara fältlistan för att kunna bygga payload
      window._faltLista = falt;
    }
 
    async function skickaAnmalan(e) {
      e.preventDefault();
      const btn = document.getElementById('skickaBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Skickar...';
 
      const falt = window._faltLista || [];
      const dataArr = falt.map((f, i) => {
        let value = '';
        if (f.typ === 'radio') {
          const checked = document.querySelector(`input[name="falt_${i}"]:checked`);
          value = checked ? checked.value : '';
        } else if (f.typ === 'checkbox') {
          const el = document.getElementById('falt_' + i);
          value = el && el.checked ? 'ja' : 'nej';
        } else {
          const el = document.getElementById('falt_' + i) || document.querySelector(`[name="${f.namn}"]`);
          value = el ? el.value : '';
        }
        return { label: f.namn, value };
      });
 
      const payload = {
        form_id: formId,
        data: dataArr
      };
 
      try {
        await fetch(formData.webhook_url, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
          body: JSON.stringify(payload)
        });
        visaStatus('ok', '✅ Tack för din anmälan! Vi hör av oss.');
        document.getElementById('anmalanForm').reset();
      } catch(e) {
        visaStatus('err', '❌ Något gick fel. Försök igen eller kontakta oss.');
        btn.disabled = false;
        btn.textContent = 'Skicka anmälan';
      }
    }
 
    function visaStatus(typ, msg) {
      const el = document.getElementById('formStatus');
      el.textContent = msg;
      el.className = 'status ' + typ;
      el.style.display = 'block';
    }
 
    init();
  </script>
</body>
</html>
