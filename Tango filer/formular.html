<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tango Norteño – Formulärbyggare</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; padding: 1rem; background: #f5f5f5; }
    h1 { color: #8B0000; }
    h2 { color: #333; margin-top: 1.5rem; }
    .card { background: white; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    label { display: block; margin-bottom: 0.3rem; font-weight: bold; font-size: 0.9rem; }
    input, select, textarea { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 0.8rem; }
    button { background: #8B0000; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 4px; cursor: pointer; margin-right: 0.5rem; margin-bottom: 0.5rem; }
    button:hover { background: #6a0000; }
    button.secondary { background: #555; }
    button.del { background: #c00; padding: 0.3rem 0.7rem; font-size: 0.85rem; }
    .falt-rad { display: flex; align-items: center; gap: 0.5rem; background: #f9f9f9; border: 1px solid #ddd; border-radius: 6px; padding: 0.6rem 0.8rem; margin-bottom: 0.5rem; }
    .falt-rad span { flex: 1; font-size: 0.9rem; }
    .falt-rad .typ-tag { font-size: 0.75rem; color: #666; background: #eee; padding: 0.2rem 0.5rem; border-radius: 3px; }
    .status { margin-top: 0.5rem; font-size: 0.9rem; }
    .ok { color: green; }
    .err { color: red; }
    #delaCard { display: none; }
    #shareUrl { background: #f0f0f0; }
  </style>
</head>
<body>
  <h1>🌹 Formulärbyggare – Kurser</h1>
 
  <div class="card">
    <h2>Formulärinformation</h2>
    <label>Titel *</label>
    <input id="fTitel" placeholder="t.ex. Grundkurs vår 2025" />
    <label>Beskrivning</label>
    <textarea id="fDesc" rows="3" placeholder="Valfri beskrivning till deltagarna..."></textarea>
    <label>Webhook-URL (POST, dit anmälningar skickas)</label>
    <input id="fWebhook" placeholder="https://n8n.../webhook/anmalan-kurs" />
  </div>
 
  <div class="card">
    <h2>Lägg till fält</h2>
    <label>Fältnamn</label>
    <input id="nyttFaltNamn" placeholder="t.ex. Namn, E-post, Telefon..." />
    <label>Typ</label>
    <select id="nyttFaltTyp">
      <option value="text">Text</option>
      <option value="email">E-post</option>
      <option value="tel">Telefon</option>
      <option value="number">Nummer</option>
      <option value="textarea">Lång text</option>
      <option value="select">Dropdown</option>
      <option value="radio">Alternativ (radio)</option>
      <option value="checkbox">Kryssruta</option>
    </select>
    <label>Alternativ (kommaseparerade, för dropdown/radio)</label>
    <input id="nyttFaltAlternativ" placeholder="t.ex. Förare, Följare, Båda" />
    <label>
      <input type="checkbox" id="nyttFaltKrav" style="width:auto;margin:0 0.3rem 0 0" />
      Obligatoriskt fält
    </label>
    <br />
    <button onclick="laggTillFalt()">➕ Lägg till fält</button>
    <div id="byggStatus" class="status"></div>
  </div>
 
  <div class="card">
    <h2>Formulärets fält</h2>
    <div id="faltLista"><em>Inga fält tillagda ännu.</em></div>
    <br />
    <button onclick="sparaOchVisaDela()">💾 Spara &amp; dela formulär</button>
    <div id="sparaStatus" class="status"></div>
  </div>
 
  <div class="card" id="delaCard">
    <h2>✅ Formulär sparat!</h2>
    <p>Dela denna länk med deltagarna:</p>
    <input id="shareUrl" readonly />
    <button onclick="kopiera()">📋 Kopiera länk</button>
    <div id="kopieraStatus" class="status"></div>
  </div>
 
  <script>
    // Webhook-URL för spara_formular – hämtas från adminpanelens localStorage-nyckel
    function getSparaUrl() {
      try {
        return JSON.parse(localStorage.getItem('tn_admin_urls') || '{}').urlSparaFormular || '';
      } catch(e) { return ''; }
    }
 
    let falt = [];
 
    function laggTillFalt() {
      const namn = document.getElementById('nyttFaltNamn').value.trim();
      const typ = document.getElementById('nyttFaltTyp').value;
      const alternativRaw = document.getElementById('nyttFaltAlternativ').value.trim();
      const krav = document.getElementById('nyttFaltKrav').checked;
 
      if (!namn) { visa('byggStatus','err','Fyll i ett fältnamn.'); return; }
 
      const alternativ = (typ === 'select' || typ === 'radio')
        ? alternativRaw.split(',').map(s => s.trim()).filter(Boolean)
        : [];
 
      falt.push({ namn, typ, alternativ, krav });
      document.getElementById('nyttFaltNamn').value = '';
      document.getElementById('nyttFaltAlternativ').value = '';
      document.getElementById('nyttFaltKrav').checked = false;
      visa('byggStatus','ok','✅ Fält tillagt.');
      renderaFalt();
    }
 
    function taBortFalt(i) {
      falt.splice(i, 1);
      renderaFalt();
    }
 
    function renderaFalt() {
      const el = document.getElementById('faltLista');
      if (falt.length === 0) { el.innerHTML = '<em>Inga fält tillagda ännu.</em>'; return; }
      el.innerHTML = falt.map((f, i) => `
        <div class="falt-rad">
          <span>${f.namn}${f.krav ? ' *' : ''}</span>
          <span class="typ-tag">${f.typ}</span>
          ${f.alternativ.length ? `<span class="typ-tag">${f.alternativ.join(', ')}</span>` : ''}
          <button class="del" onclick="taBortFalt(${i})">✕</button>
        </div>
      `).join('');
    }
 
    async function sparaOchVisaDela() {
      const titel = document.getElementById('fTitel').value.trim();
      const webhookUrl = document.getElementById('fWebhook').value.trim();
      if (!titel) { visa('sparaStatus','err','Fyll i en titel.'); return; }
      if (falt.length === 0) { visa('sparaStatus','err','Lägg till minst ett fält.'); return; }
      if (!webhookUrl) { visa('sparaStatus','err','Fyll i webhook-URL:en dit anmälningar skickas.'); return; }
 
      const sparaUrl = getSparaUrl();
      if (!sparaUrl) { visa('sparaStatus','err','Ange spara_formular-webhook i adminpanelen (index.html).'); return; }
 
      const payload = {
        titel,
        desc: document.getElementById('fDesc').value.trim(),
        webhook_url: webhookUrl,
        falt
      };
 
      visa('sparaStatus','','⏳ Sparar...');
      try {
        const res = await fetch(sparaUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
 
        const url = location.origin + location.pathname.replace('formular.html','') + 'formularsida.html?form=' + data.id;
        document.getElementById('shareUrl').value = url;
        document.getElementById('delaCard').style.display = 'block';
        visa('sparaStatus','ok','✅ Formulär sparat!');
      } catch(e) {
        visa('sparaStatus','err','❌ Fel: ' + e.message);
      }
    }
 
    function kopiera() {
      const el = document.getElementById('shareUrl');
      el.select();
      document.execCommand('copy');
      visa('kopieraStatus','ok','✅ Kopierat!');
    }
 
    function visa(id, typ, msg) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.className = 'status ' + typ;
    }
  </script>
</body>
</html>
