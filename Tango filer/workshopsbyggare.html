<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tango Norteño – Workshopbyggare</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; padding: 1rem; background: #f5f5f5; }
    h1 { color: #8B0000; }
    h2 { color: #333; margin-top: 1.5rem; }
    .card { background: white; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    label { display: block; margin-bottom: 0.3rem; font-weight: bold; font-size: 0.9rem; }
    input, textarea { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 0.8rem; }
    input[type="number"] { width: 100px; }
    button { background: #8B0000; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 4px; cursor: pointer; margin-right: 0.5rem; margin-bottom: 0.5rem; }
    button:hover { background: #6a0000; }
    button.del { background: #c00; padding: 0.3rem 0.7rem; font-size: 0.85rem; }
    .ws-rad { display: flex; align-items: center; gap: 0.5rem; background: #f9f9f9; border: 1px solid #ddd; border-radius: 6px; padding: 0.6rem 0.8rem; margin-bottom: 0.5rem; }
    .ws-rad span { flex: 1; font-size: 0.9rem; }
    .ws-rad .max-tag { font-size: 0.75rem; color: #666; background: #eee; padding: 0.2rem 0.5rem; border-radius: 3px; }
    .status { margin-top: 0.5rem; font-size: 0.9rem; }
    .ok { color: green; }
    .err { color: red; }
    #delaCard { display: none; }
    #shareUrl { background: #f0f0f0; }
  </style>
</head>
<body>
  <h1>🌹 Workshopbyggare</h1>
 
  <div class="card">
    <h2>Eventinformation</h2>
    <label>Titel *</label>
    <input id="evTitel" placeholder="t.ex. Milonga-helg maj 2025" />
    <label>Beskrivning</label>
    <textarea id="evDesc" rows="3" placeholder="Valfri beskrivning till deltagarna..."></textarea>
    <label>Webhook-URL (POST, dit anmälningar skickas)</label>
    <input id="evWebhook" placeholder="https://n8n.../webhook/anmalan-workshop" />
    <label>Deltagarens namn-fält (hämtas automatiskt)</label>
    <input id="evNamnFalt" placeholder="Namn" value="Namn" />
    <label>Deltagarens telefonfält</label>
    <input id="evTelFalt" placeholder="Telefon" value="Telefon" />
  </div>
 
  <div class="card">
    <h2>Lägg till workshop</h2>
    <label>Workshopnamn *</label>
    <input id="wsNamn" placeholder="t.ex. Grundkurs, Milonga, Teknik..." />
    <label>Max antal deltagare</label>
    <input type="number" id="wsMax" value="20" min="1" />
    <button onclick="laggTillWs()">➕ Lägg till workshop</button>
    <div id="wsStatus" class="status"></div>
  </div>
 
  <div class="card">
    <h2>Workshops i eventet</h2>
    <div id="wsLista"><em>Inga workshops tillagda ännu.</em></div>
    <br />
    <button onclick="sparaOchVisaDela()">💾 Spara &amp; dela</button>
    <div id="sparaStatus" class="status"></div>
  </div>
 
  <div class="card" id="delaCard">
    <h2>✅ Event sparat!</h2>
    <p>Dela denna länk med deltagarna:</p>
    <input id="shareUrl" readonly />
    <button onclick="kopiera()">📋 Kopiera länk</button>
    <div id="kopieraStatus" class="status"></div>
  </div>
 
  <script>
    function getSparaWsUrl() {
      try {
        return JSON.parse(localStorage.getItem('tn_admin_urls') || '{}').urlSparaWorkshop || '';
      } catch(e) { return ''; }
    }
 
    let workshops = [];
 
    function laggTillWs() {
      const namn = document.getElementById('wsNamn').value.trim();
      const max = parseInt(document.getElementById('wsMax').value) || 20;
      if (!namn) { visa('wsStatus','err','Fyll i ett workshopnamn.'); return; }
      workshops.push({ namn, max });
      document.getElementById('wsNamn').value = '';
      document.getElementById('wsMax').value = '20';
      visa('wsStatus','ok','✅ Workshop tillagd.');
      renderaWs();
    }
 
    function taBortWs(i) {
      workshops.splice(i, 1);
      renderaWs();
    }
 
    function renderaWs() {
      const el = document.getElementById('wsLista');
      if (workshops.length === 0) { el.innerHTML = '<em>Inga workshops tillagda ännu.</em>'; return; }
      el.innerHTML = workshops.map((w, i) => `
        <div class="ws-rad">
          <span>${w.namn}</span>
          <span class="max-tag">Max ${w.max}</span>
          <button class="del" onclick="taBortWs(${i})">✕</button>
        </div>
      `).join('');
    }
 
    async function sparaOchVisaDela() {
      const titel = document.getElementById('evTitel').value.trim();
      const webhookUrl = document.getElementById('evWebhook').value.trim();
      if (!titel) { visa('sparaStatus','err','Fyll i en titel.'); return; }
      if (workshops.length === 0) { visa('sparaStatus','err','Lägg till minst en workshop.'); return; }
      if (!webhookUrl) { visa('sparaStatus','err','Fyll i webhook-URL:en.'); return; }
 
      const sparaUrl = getSparaWsUrl();
      if (!sparaUrl) { visa('sparaStatus','err','Ange spara_workshop-webhook i adminpanelen (index.html).'); return; }
 
      const payload = {
        titel,
        desc: document.getElementById('evDesc').value.trim(),
        webhook_url: webhookUrl,
        namnFalt: document.getElementById('evNamnFalt').value.trim() || 'Namn',
        telFalt: document.getElementById('evTelFalt').value.trim() || 'Telefon',
        workshops_json: JSON.stringify(workshops)
      };
 
      visa('sparaStatus','','⏳ Sparar...');
      try {
        const res = await fetch(sparaUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
 
        const url = location.origin + location.pathname.replace('workshopsbyggare.html','') + 'workshopsida.html?event=' + data.id;
        document.getElementById('shareUrl').value = url;
        document.getElementById('delaCard').style.display = 'block';
        visa('sparaStatus','ok','✅ Event sparat!');
      } catch(e) {
        visa('sparaStatus','err','❌ Fel: ' + e.message);
      }
    }
 
    function kopiera() {
      document.getElementById('shareUrl').select();
      document.execCommand('copy');
      visa('kopieraStatus','ok','✅ Kopierat!');
    }
 
    function visa(id, typ, msg) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.className = 'status ' + typ;
    }
  </script>
</body>
</html>
