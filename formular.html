<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tangoklubb – Formulärbyggare</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --border: #e2ddd6;
      --text: #1a1714;
      --muted: #8a8480;
      --accent: #c8a96e;
      --accent-dark: #a8894e;
      --danger: #c0392b;
      --danger-bg: #fdf0f0;
      --success: #1e7e4a;
      --success-bg: #f0faf4;
      --radius: 10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* VIEWS */
    .view { display: none; min-height: 100vh; }
    .view.active { display: block; }

    /* =================== HOME =================== */
    #home {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
      min-height: 100vh;
    }
    #home.active { display: flex; }

    .home-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      text-align: center;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }
    .home-title em { font-style: italic; color: var(--accent-dark); }
    .home-sub { color: var(--muted); font-size: 15px; margin-bottom: 3rem; text-align: center; }

    .home-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
      max-width: 560px;
    }
    @media (max-width: 500px) { .home-cards { grid-template-columns: 1fr; } }

    .home-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem 1.5rem;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s;
      text-align: left;
    }
    .home-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-2px); }
    .home-card-icon { font-size: 28px; margin-bottom: 0.75rem; }
    .home-card-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
    .home-card-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }

    .home-divider { width: 100%; max-width: 560px; margin: 2rem 0 1rem; }
    .open-form-row { width: 100%; max-width: 560px; display: flex; gap: 8px; }
    .open-form-row input {
      flex: 1; padding: 10px 12px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface);
      font-size: 14px; color: var(--text); font-family: 'DM Sans', sans-serif;
    }
    .open-form-row input:focus { outline: none; border-color: var(--accent); }
    .open-form-row button {
      padding: 10px 16px; border-radius: var(--radius);
      border: 1px solid var(--accent); background: var(--accent);
      color: #fff; font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .open-form-row button:hover { background: var(--accent-dark); border-color: var(--accent-dark); }

    /* =================== BUILDER =================== */
    #builder {
      display: none;
      padding: 2rem 1rem 4rem;
    }
    #builder.active { display: block; }

    .builder-inner { max-width: 700px; margin: 0 auto; }

    .top-bar {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 2rem; flex-wrap: wrap;
    }
    .back-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 13px; font-family: 'DM Sans', sans-serif;
      padding: 4px 0; display: flex; align-items: center; gap: 4px;
    }
    .back-btn:hover { color: var(--text); }
    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem; flex: 1;
    }

    .section-label {
      font-size: 11px; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .form-meta { margin-bottom: 2rem; }
    .form-meta input, .form-meta textarea {
      width: 100%; padding: 10px 12px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface);
      font-size: 15px; color: var(--text); font-family: 'DM Sans', sans-serif;
      margin-bottom: 8px;
    }
    .form-meta input:focus, .form-meta textarea:focus { outline: none; border-color: var(--accent); }
    .form-meta textarea { resize: vertical; min-height: 60px; font-size: 14px; }

    /* Webhook input */
    .webhook-row { margin-bottom: 2rem; }
    .webhook-row input {
      width: 100%; padding: 10px 12px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface);
      font-size: 13px; color: var(--text); font-family: 'DM Sans', sans-serif;
    }
    .webhook-row input:focus { outline: none; border-color: var(--accent); }

    /* Fields list */
    .fields-list { margin-bottom: 1.5rem; }
    .field-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1rem 1rem 0.75rem;
      margin-bottom: 8px; display: flex; align-items: flex-start; gap: 0.75rem;
    }
    .field-drag { color: var(--muted); cursor: grab; font-size: 16px; padding-top: 2px; user-select: none; }
    .field-info { flex: 1; }
    .field-label { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
    .field-meta { font-size: 12px; color: var(--muted); }
    .field-required { color: var(--accent-dark); font-weight: 500; }
    .field-actions { display: flex; gap: 6px; }
    .field-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 14px; padding: 4px;
      border-radius: 6px; transition: color 0.15s, background 0.15s;
    }
    .field-btn:hover { color: var(--danger); background: var(--danger-bg); }

    /* Add field panel */
    .add-field-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.5rem;
    }
    .add-field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    @media (max-width: 500px) { .add-field-grid { grid-template-columns: 1fr; } }
    .add-field-panel input, .add-field-panel select, .add-field-panel textarea {
      width: 100%; padding: 9px 11px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg);
      font-size: 14px; color: var(--text); font-family: 'DM Sans', sans-serif;
    }
    .add-field-panel input:focus, .add-field-panel select:focus, .add-field-panel textarea:focus {
      outline: none; border-color: var(--accent);
    }
    .add-field-panel textarea { resize: vertical; min-height: 60px; font-size: 13px; }
    .options-hint { font-size: 12px; color: var(--muted); margin-bottom: 6px; }

    .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--muted); margin-bottom: 10px; }
    .checkbox-row input[type=checkbox] { width: auto; }

    .add-btn {
      width: 100%; padding: 10px; border-radius: 8px;
      border: 1px solid var(--accent); background: var(--accent);
      color: #fff; font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .add-btn:hover { background: var(--accent-dark); border-color: var(--accent-dark); }

    /* Publish */
    .publish-btn {
      width: 100%; padding: 13px; border-radius: var(--radius);
      border: none; background: var(--text); color: var(--bg);
      font-size: 15px; font-weight: 500; cursor: pointer;
      font-family: 'DM Serif Display', serif; letter-spacing: 0.02em;
      transition: opacity 0.2s;
    }
    .publish-btn:hover { opacity: 0.85; }

    .share-box {
      margin-top: 1rem; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem; display: none;
    }
    .share-box.show { display: block; }
    .share-url {
      font-size: 13px; word-break: break-all; color: var(--accent-dark);
      margin-bottom: 8px; font-family: monospace;
    }
    .copy-btn {
      padding: 7px 14px; border-radius: 7px; border: 1px solid var(--border);
      background: var(--surface); font-size: 13px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; color: var(--text);
    }
    .copy-btn:hover { background: var(--bg); }

    /* =================== FORM VIEW =================== */
    #formview {
      display: none;
      padding: 0;
      background: var(--bg);
    }
    #formview.active { display: block; }

    .formview-hero {
      background: var(--text); color: var(--bg);
      padding: 3rem 1.5rem 2.5rem;
      text-align: center;
    }
    .formview-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      margin-bottom: 0.5rem;
    }
    .formview-desc { font-size: 15px; opacity: 0.7; max-width: 500px; margin: 0 auto; }

    .formview-body { max-width: 560px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    .form-question { margin-bottom: 1.75rem; }
    .form-question label {
      display: block; font-size: 15px; font-weight: 500;
      margin-bottom: 8px;
    }
    .form-question label .req { color: var(--accent-dark); }
    .form-question input[type=text],
    .form-question input[type=email],
    .form-question input[type=tel],
    .form-question input[type=number],
    .form-question input[type=date],
    .form-question textarea {
      width: 100%; padding: 11px 13px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface);
      font-size: 15px; color: var(--text); font-family: 'DM Sans', sans-serif;
      transition: border-color 0.15s;
    }
    .form-question input:focus, .form-question textarea:focus {
      outline: none; border-color: var(--accent);
    }
    .form-question textarea { resize: vertical; min-height: 80px; }

    .radio-group, .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
    .radio-option, .checkbox-option {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; cursor: pointer;
      transition: border-color 0.15s;
      font-size: 15px;
    }
    .radio-option:hover, .checkbox-option:hover { border-color: var(--accent); }
    .radio-option input, .checkbox-option input { width: auto; accent-color: var(--accent-dark); }

    .submit-btn {
      width: 100%; padding: 14px; border-radius: var(--radius);
      border: none; background: var(--text); color: var(--bg);
      font-size: 16px; font-weight: 500; cursor: pointer;
      font-family: 'DM Serif Display', serif; letter-spacing: 0.02em;
      margin-top: 1rem; transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .form-success {
      text-align: center; padding: 4rem 2rem;
    }
    .form-success-icon { font-size: 48px; margin-bottom: 1rem; }
    .form-success h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem; margin-bottom: 0.5rem;
    }
    .form-success p { color: var(--muted); font-size: 15px; }
  </style>
</head>
<body>

<!-- HOME -->
<div id="home" class="view active">
  <div class="home-title">Tango<em>formulär</em></div>
  <div class="home-sub">Bygg och dela formulär för din förening</div>

  <div class="home-cards">
    <div class="home-card" onclick="showBuilder()">
      <div class="home-card-icon">✏️</div>
      <div class="home-card-title">Skapa formulär</div>
      <div class="home-card-desc">Bygg ett nytt formulär med egna fält</div>
    </div>
    <div class="home-card" onclick="showMyForms()">
      <div class="home-card-icon">📋</div>
      <div class="home-card-title">Mina formulär</div>
      <div class="home-card-desc">Se och hantera tidigare formulär</div>
    </div>
  </div>

  <div class="home-divider">
    <div class="section-label" style="margin-bottom:0.5rem">Öppna formulär med ID</div>
    <div class="open-form-row">
      <input id="open-id-input" placeholder="Formulär-ID..." />
      <button onclick="openFormById()">Öppna</button>
    </div>
  </div>
</div>

<!-- BUILDER -->
<div id="builder" class="view">
  <div class="builder-inner">
    <div class="top-bar">
      <button class="back-btn" onclick="showHome()">← Tillbaka</button>
      <div class="page-title">Skapa formulär</div>
    </div>

    <div class="form-meta">
      <div class="section-label">Formulärinfo</div>
      <input id="form-title" placeholder="Formulärnamn, t.ex. Kursanmälan höst 2025" />
      <textarea id="form-desc" placeholder="Beskrivning (valfritt)"></textarea>
    </div>

    <div class="webhook-row">
      <div class="section-label">Webhook URL (n8n)</div>
      <input id="form-webhook" placeholder="https://din-n8n.../webhook/tango-formular" />
    </div>

    <div class="section-label">Fält</div>
    <div class="fields-list" id="fields-list"></div>

    <div class="add-field-panel">
      <div class="section-label" style="margin-bottom:0.75rem">Lägg till fält</div>
      <div class="add-field-grid">
        <input id="field-label" placeholder="Fältnamn, t.ex. Namn" />
        <select id="field-type">
          <option value="text">Text</option>
          <option value="email">E-post</option>
          <option value="tel">Telefon</option>
          <option value="number">Nummer</option>
          <option value="date">Datum</option>
          <option value="textarea">Långtext</option>
          <option value="radio">Flerval (välj ett)</option>
          <option value="checkbox">Flerval (välj flera)</option>
        </select>
      </div>
      <div id="options-wrap" style="display:none; margin-bottom:8px;">
        <div class="options-hint">Alternativ (ett per rad):</div>
        <textarea id="field-options" placeholder="Förare&#10;Följare&#10;Dubbelroll"></textarea>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="field-required" />
        <label for="field-required">Obligatoriskt fält</label>
      </div>
      <button class="add-btn" onclick="addField()">+ Lägg till fält</button>
    </div>

    <button class="publish-btn" onclick="publishForm()">Publicera formulär →</button>
    <div class="share-box" id="share-box">
      <div class="section-label" style="margin-bottom:0.5rem">Dela denna länk</div>
      <div class="share-url" id="share-url"></div>
      <button class="copy-btn" onclick="copyLink()">Kopiera länk</button>
    </div>
  </div>
</div>

<!-- FORM VIEW -->
<div id="formview" class="view">
  <div class="formview-hero">
    <div class="formview-title" id="fv-title"></div>
    <div class="formview-desc" id="fv-desc"></div>
  </div>
  <div class="formview-body" id="fv-body"></div>
</div>

<script>
  let fields = [];
  let editingId = null;

  // =================== NAVIGATION ===================
  function showHome() {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('home').classList.add('active');
  }

  function showBuilder(formId) {
    fields = [];
    editingId = formId || null;

    if (formId) {
      const saved = loadForm(formId);
      if (saved) {
        document.getElementById('form-title').value = saved.title || '';
        document.getElementById('form-desc').value = saved.desc || '';
        document.getElementById('form-webhook').value = saved.webhook || '';
        fields = saved.fields || [];
        renderFields();
      }
    } else {
      document.getElementById('form-title').value = '';
      document.getElementById('form-desc').value = '';
      document.getElementById('form-webhook').value = '';
      renderFields();
    }

    document.getElementById('share-box').classList.remove('show');
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('builder').classList.add('active');
  }

  function showMyForms() {
    const forms = getAllForms();
    if (forms.length === 0) {
      alert('Du har inga sparade formulär ännu.');
      return;
    }
    const list = forms.map((f, i) => `${i+1}. ${f.title || 'Namnlöst'} (ID: ${f.id})`).join('\n');
    const choice = prompt('Dina formulär:\n\n' + list + '\n\nSkriv ID för att öppna:');
    if (choice) openFormById(choice.trim());
  }

  function openFormById(id) {
    const inputId = id || document.getElementById('open-id-input').value.trim();
    if (!inputId) return;
    const form = loadForm(inputId);
    if (!form) { alert('Inget formulär hittades med det ID:t.'); return; }
    renderFormView(form);
  }

  // =================== BUILDER ===================
  document.getElementById('field-type').addEventListener('change', function() {
    const show = this.value === 'radio' || this.value === 'checkbox';
    document.getElementById('options-wrap').style.display = show ? 'block' : 'none';
  });

  function addField() {
    const label = document.getElementById('field-label').value.trim();
    const type = document.getElementById('field-type').value;
    const required = document.getElementById('field-required').checked;
    const optionsRaw = document.getElementById('field-options').value;

    if (!label) { alert('Skriv ett fältnamn.'); return; }

    const options = (type === 'radio' || type === 'checkbox')
      ? optionsRaw.split('\n').map(o => o.trim()).filter(Boolean)
      : [];

    if ((type === 'radio' || type === 'checkbox') && options.length < 2) {
      alert('Lägg till minst 2 alternativ.');
      return;
    }

    fields.push({ id: Date.now(), label, type, required, options });
    renderFields();

    document.getElementById('field-label').value = '';
    document.getElementById('field-options').value = '';
    document.getElementById('field-required').checked = false;
    document.getElementById('options-wrap').style.display = 'none';
    document.getElementById('field-type').value = 'text';
  }

  function removeField(id) {
    fields = fields.filter(f => f.id !== id);
    renderFields();
  }

  function renderFields() {
    const list = document.getElementById('fields-list');
    if (fields.length === 0) {
      list.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:0.5rem 0 1rem;">Inga fält ännu. Lägg till fält nedan.</div>';
      return;
    }
    list.innerHTML = fields.map(f => `
      <div class="field-item">
        <div class="field-drag">⠿</div>
        <div class="field-info">
          <div class="field-label">${f.label} ${f.required ? '<span class="field-required">*</span>' : ''}</div>
          <div class="field-meta">${typeLabel(f.type)}${f.options.length ? ' · ' + f.options.join(', ') : ''}</div>
        </div>
        <div class="field-actions">
          <button class="field-btn" onclick="removeField(${f.id})">✕</button>
        </div>
      </div>
    `).join('');
  }

  function typeLabel(t) {
    const map = { text:'Text', email:'E-post', tel:'Telefon', number:'Nummer', date:'Datum', textarea:'Långtext', radio:'Flerval (ett)', checkbox:'Flerval (flera)' };
    return map[t] || t;
  }

  function publishForm() {
    const title = document.getElementById('form-title').value.trim();
    const desc = document.getElementById('form-desc').value.trim();
    const webhook = document.getElementById('form-webhook').value.trim();

    if (!title) { alert('Skriv ett formulärnamn.'); return; }
    if (fields.length === 0) { alert('Lägg till minst ett fält.'); return; }

    const id = editingId || Math.random().toString(36).slice(2, 9);
    const form = { id, title, desc, webhook, fields };
    saveForm(form);

    const url = window.location.origin + window.location.pathname + '?form=' + id;
    document.getElementById('share-url').textContent = url;
    document.getElementById('share-box').classList.add('show');
    editingId = id;
  }

  function copyLink() {
    const url = document.getElementById('share-url').textContent;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Kopierat!';
      setTimeout(() => btn.textContent = 'Kopiera länk', 2000);
    });
  }

  // =================== FORM VIEW ===================
  function renderFormView(form) {
    document.getElementById('fv-title').textContent = form.title;
    document.getElementById('fv-desc').textContent = form.desc || '';

    const body = document.getElementById('fv-body');
    body.innerHTML = '';

    const formEl = document.createElement('form');
    formEl.id = 'user-form';

    form.fields.forEach(f => {
      const wrap = document.createElement('div');
      wrap.className = 'form-question';

      const label = document.createElement('label');
      label.innerHTML = f.label + (f.required ? ' <span class="req">*</span>' : '');
      wrap.appendChild(label);

      if (f.type === 'textarea') {
        const el = document.createElement('textarea');
        el.name = f.label;
        if (f.required) el.required = true;
        wrap.appendChild(el);
      } else if (f.type === 'radio') {
        const group = document.createElement('div');
        group.className = 'radio-group';
        f.options.forEach(opt => {
          const lbl = document.createElement('label');
          lbl.className = 'radio-option';
          lbl.innerHTML = `<input type="radio" name="${f.label}" value="${opt}" ${f.required ? 'required' : ''}> ${opt}`;
          group.appendChild(lbl);
        });
        wrap.appendChild(group);
      } else if (f.type === 'checkbox') {
        const group = document.createElement('div');
        group.className = 'checkbox-group';
        f.options.forEach(opt => {
          const lbl = document.createElement('label');
          lbl.className = 'checkbox-option';
          lbl.innerHTML = `<input type="checkbox" name="${f.label}" value="${opt}"> ${opt}`;
          group.appendChild(lbl);
        });
        wrap.appendChild(group);
      } else {
        const el = document.createElement('input');
        el.type = f.type;
        el.name = f.label;
        if (f.required) el.required = true;
        wrap.appendChild(el);
      }

      formEl.appendChild(wrap);
    });

    const submitBtn = document.createElement('button');
    submitBtn.type = 'submit';
    submitBtn.className = 'submit-btn';
    submitBtn.textContent = 'Skicka in';
    formEl.appendChild(submitBtn);

    formEl.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Skickar...';

      const data = {};
      form.fields.forEach(f => {
        if (f.type === 'checkbox') {
          const checked = [...formEl.querySelectorAll(`input[name="${f.label}"]:checked`)].map(i => i.value);
          data[f.label] = checked.join(', ');
        } else if (f.type === 'radio') {
          const checked = formEl.querySelector(`input[name="${f.label}"]:checked`);
          data[f.label] = checked ? checked.value : '';
        } else {
          const el = formEl.querySelector(`[name="${f.label}"]`);
          data[f.label] = el ? el.value : '';
        }
      });

      if (form.webhook) {
        try {
          await fetch(form.webhook, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: Object.entries(data).map(([label, value]) => ({ label, value })) }),
            mode: 'no-cors'
          });
        } catch(e) {}
      }

      body.innerHTML = `
        <div class="form-success">
          <div class="form-success-icon">✓</div>
          <h2>Tack!</h2>
          <p>Ditt svar har skickats in.</p>
        </div>
      `;
    });

    body.appendChild(formEl);

    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('formview').classList.add('active');
  }

  // =================== STORAGE ===================
  function saveForm(form) {
    const all = getAllForms();
    const idx = all.findIndex(f => f.id === form.id);
    if (idx >= 0) all[idx] = form; else all.push(form);
    localStorage.setItem('tango_forms', JSON.stringify(all));
  }

  function loadForm(id) {
    return getAllForms().find(f => f.id === id) || null;
  }

  function getAllForms() {
    try { return JSON.parse(localStorage.getItem('tango_forms') || '[]'); } catch { return []; }
  }

  // =================== INIT ===================
  function init() {
    const params = new URLSearchParams(window.location.search);
    const formId = params.get('form');
    if (formId) {
      const form = loadForm(formId);
      if (form) { renderFormView(form); return; }
    }
    showHome();
  }

  init();
</script>
</body>
</html>
