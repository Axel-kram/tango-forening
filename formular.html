<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tango Norteño – Formulärbyggare</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');
:root {
  --bg: #f5f0e8;
  --card: #fdf9f3;
  --border: #ddd5c4;
  --brown: #5c3d2e;
  --brown-light: #7a5444;
  --brown-dark: #3a2318;
  --text: #2e1f14;
  --muted: #8a7060;
  --danger: #9b2335;
  --success: #3a6b45;
  --off-white: #f9f5ef;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 40px 20px;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c4b49a' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
header { text-align: center; margin-bottom: 40px; }
.logo { width: 60px; height: 60px; object-fit: contain; margin-bottom: 10px; border-radius: 50%; border: 2px solid var(--border); }
header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--brown-dark); }
header p { color: var(--muted); margin-top: 6px; font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; }
.back-link { display: inline-block; color: var(--muted); text-decoration: none; font-size: 0.82rem; letter-spacing: 0.06em; margin-bottom: 24px; transition: color 0.2s; }
.back-link:hover { color: var(--brown); }
.container { max-width: 700px; margin: 0 auto; }
.tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
.tab { flex: 1; padding: 10px; background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; cursor: pointer; border-radius: 7px; transition: all 0.2s; }
.tab.active { background: var(--brown); color: var(--off-white); font-weight: 500; }
.tab:hover:not(.active) { background: var(--bg); color: var(--brown); }
.panel { display: none; }
.panel.active { display: block; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 10px rgba(60,35,20,0.05); }
.card h2 { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--brown); margin-bottom: 16px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
.field input, .field select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus { border-color: var(--brown); }
.field select option { background: var(--card); }
.field-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; }
.field-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.field-item { display: flex; align-items: center; gap: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
.field-item .fi-label { flex: 1; font-size: 0.9rem; color: var(--text); }
.field-item .fi-type { font-size: 0.75rem; color: var(--muted); background: var(--border); padding: 2px 8px; border-radius: 4px; }
.field-item .fi-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 2px 6px; border-radius: 4px; transition: color 0.2s; }
.field-item .fi-del:hover { color: var(--danger); }
.btn { padding: 11px 20px; border-radius: 8px; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; cursor: pointer; letter-spacing: 0.04em; transition: all 0.2s; }
.btn-gold { background: var(--brown); color: var(--off-white); font-weight: 500; }
.btn-gold:hover { background: var(--brown-dark); }
.btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--brown); color: var(--brown); }
.btn-ghost { background: none; border: 1px dashed var(--border); color: var(--muted); width: 100%; padding: 12px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; cursor: pointer; transition: all 0.2s; }
.btn-ghost:hover { border-color: var(--brown); color: var(--brown); }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
.status { font-size: 0.85rem; padding: 10px 14px; border-radius: 8px; margin-top: 12px; display: none; }
.status.ok { background: rgba(58,107,69,0.1); border: 1px solid rgba(58,107,69,0.25); color: var(--success); display: block; }
.status.err { background: rgba(155,35,53,0.1); border: 1px solid rgba(155,35,53,0.25); color: var(--danger); display: block; }
#optionEditor { display: none; }
#optionEditor.show { display: block; }
.option-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.option-row { display: flex; gap: 8px; align-items: center; }
.option-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; }
.option-row input:focus { border-color: var(--brown); }
.option-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 4px 8px; }
.option-del:hover { color: var(--danger); }
.saved-list { display: flex; flex-direction: column; gap: 10px; }
.saved-item { display: flex; align-items: center; gap: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; cursor: pointer; transition: border-color 0.2s; }
.saved-item:hover { border-color: var(--brown); }
.saved-name { flex: 1; font-size: 0.9rem; color: var(--text); }
.saved-meta { font-size: 0.75rem; color: var(--muted); }
.empty-state { text-align: center; padding: 40px; color: var(--muted); font-size: 0.85rem; border: 1px dashed var(--border); border-radius: 8px; }
.form-view { max-width: 560px; margin: 0 auto; }
.form-view-title { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--brown-dark); margin-bottom: 6px; text-align: center; }
.form-view-desc { color: var(--muted); font-size: 0.88rem; text-align: center; margin-bottom: 32px; }
.fv-field { margin-bottom: 18px; }
.fv-field label { display: block; font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 7px; }
.fv-field input[type=text], .fv-field input[type=email], .fv-field input[type=tel], .fv-field input[type=date], .fv-field textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px 14px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.fv-field input:focus, .fv-field textarea:focus { border-color: var(--brown); }
.fv-field textarea { resize: vertical; min-height: 80px; }
.radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
.radio-opt input { display: none; }
.radio-opt label { display: block; padding: 9px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; color: var(--text); }
.radio-opt input:checked + label { background: var(--brown); border-color: var(--brown); color: var(--off-white); font-weight: 500; }
.radio-opt label:hover { border-color: var(--brown-light); }
.submit-wrap { margin-top: 24px; }
.submit-btn { width: 100%; padding: 14px; background: var(--brown); color: var(--off-white); border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500; cursor: pointer; letter-spacing: 0.04em; transition: background 0.2s; }
.submit-btn:hover { background: var(--brown-dark); }
.success-msg { text-align: center; padding: 60px 20px; }
.success-msg h2 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--brown); margin-bottom: 12px; }
.success-msg p { color: var(--muted); }
.share-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-top: 12px; display: flex; gap: 10px; align-items: center; }
.share-box input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-family: 'DM Sans', monospace; font-size: 0.82rem; outline: none; }
</style>
</head>
<body>
<header>
  <img class="logo" src="https://www.tangonorteno.se/wp-content/uploads/2025/06/tn-logo.jpg" alt="" onerror="this.style.display='none'">
  <h1>Tango Norteño</h1>
  <p>Formulärbyggare</p>
</header>
<div class="container">
  <a class="back-link" href="index.html">← Tillbaka till admin</a>
  <div class="tabs">
    <button class="tab active" onclick="byttab('bygg')">Skapa formulär</button>
    <button class="tab" onclick="byttab('sparade')">Sparade</button>
    <button class="tab" id="tabForhand" style="display:none" onclick="byttab('forhand')">Förhandsgranska</button>
  </div>

  <!-- BYGG -->
  <div class="panel active" id="panel-bygg">
    <div class="card">
      <h2>Formulärinformation</h2>
      <div class="field"><label>Formulärtitel</label><input type="text" id="fTitel" placeholder="t.ex. Grundkurs VT 2025" /></div>
      <div class="field"><label>Beskrivning (valfritt)</label><input type="text" id="fDesc" placeholder="Kort beskrivning" /></div>
      <div class="field"><label>Webhook URL (n8n)</label><input type="text" id="fWebhook" placeholder="https://..." /></div>
    </div>
    <div class="card">
      <h2>Fält</h2>
      <div class="field-list" id="fieldList"><div class="empty-state">Inga fält tillagda än</div></div>
      <div class="field-row">
        <div class="field">
          <label>Fältnamn</label>
          <input type="text" id="nyFalt" placeholder="t.ex. Nivå" onkeydown="if(event.key==='Enter')läggTillFält()" />
        </div>
        <div class="field">
          <label>Typ</label>
          <select id="nyTyp" onchange="visaOptionEditor()">
            <option value="text">Text</option>
            <option value="email">E-post</option>
            <option value="tel">Telefon</option>
            <option value="date">Datum</option>
            <option value="textarea">Lång text</option>
            <option value="radio">Flerval (ett)</option>
            <option value="checkbox">Flerval (flera)</option>
          </select>
        </div>
      </div>
      <div id="optionEditor" class="card" style="background:var(--bg);padding:16px;margin-bottom:14px">
        <div style="font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px">Svarsalternativ</div>
        <div class="option-list" id="optionList"></div>
        <button class="btn-ghost" onclick="läggTillOption()" style="font-size:0.82rem;padding:8px">+ Lägg till alternativ</button>
      </div>
      <button class="btn btn-outline" onclick="läggTillFält()" style="width:100%">+ Lägg till fält</button>
    </div>
    <div class="card">
      <div class="btn-row">
        <button class="btn btn-gold" onclick="sparaOchForhand()">Spara & förhandsgranska</button>
        <button class="btn btn-outline" onclick="sparaFormulär()">Spara</button>
      </div>
      <div id="byggStatus" class="status"></div>
    </div>
  </div>

  <!-- SPARADE -->
  <div class="panel" id="panel-sparade">
    <div class="card">
      <h2>Sparade formulär</h2>
      <div id="sparadeLista" class="saved-list"></div>
    </div>
  </div>

  <!-- FÖRHANDSGRANSKA -->
  <div class="panel" id="panel-forhand">
    <div class="card">
      <div class="form-view" id="formView"></div>
    </div>
    <div class="card" id="shareCard" style="display:none">
      <h2>Dela formulär</h2>
      <p style="color:var(--muted);font-size:0.85rem;margin-bottom:12px">Kopiera länken och skicka till deltagarna.</p>
      <div class="share-box">
        <input type="text" id="shareUrl" readonly />
        <button class="btn btn-outline" onclick="kopiera()">Kopiera</button>
      </div>
      <div id="kopieraStatus" class="status"></div>
    </div>
  </div>
</div>

<script>
let fält = [];
let options = [];
let aktivtId = null;

function visaOptionEditor() {
  const typ = document.getElementById('nyTyp').value;
  const ed = document.getElementById('optionEditor');
  if (typ === 'radio' || typ === 'checkbox') {
    ed.classList.add('show');
    if (options.length === 0) { options = ['','','']; renderOptions(); }
  } else {
    ed.classList.remove('show');
    options = [];
  }
}

function renderOptions() {
  document.getElementById('optionList').innerHTML = options.map((o,i) => `
    <div class="option-row">
      <input type="text" value="${o}" placeholder="Alternativ ${i+1}" oninput="options[${i}]=this.value" />
      <button class="option-del" onclick="options.splice(${i},1);renderOptions()">×</button>
    </div>
  `).join('');
}

function läggTillOption() { options.push(''); renderOptions(); }

function läggTillFält() {
  const namn = document.getElementById('nyFalt').value.trim();
  const typ = document.getElementById('nyTyp').value;
  if (!namn) return;
  const opts = (typ==='radio'||typ==='checkbox') ? options.filter(o=>o.trim()) : [];
  fält.push({ id: Date.now(), namn, typ, options: opts });
  document.getElementById('nyFalt').value = '';
  options = [];
  document.getElementById('optionEditor').classList.remove('show');
  document.getElementById('nyTyp').value = 'text';
  renderFält();
}

function taBortFält(id) { fält = fält.filter(f=>f.id!==id); renderFält(); }

function renderFält() {
  const list = document.getElementById('fieldList');
  if (fält.length === 0) { list.innerHTML = '<div class="empty-state">Inga fält tillagda än</div>'; return; }
  list.innerHTML = fält.map(f => `
    <div class="field-item">
      <span class="fi-label">${f.namn}</span>
      <span class="fi-type">${f.typ}${f.options?.length?' ('+f.options.length+' val)':''}</span>
      <button class="fi-del" onclick="taBortFält(${f.id})">×</button>
    </div>
  `).join('');
}

function sparaFormulär() {
  const titel = document.getElementById('fTitel').value.trim();
  if (!titel) return visa('byggStatus','err','Fyll i en titel.');
  if (fält.length === 0) return visa('byggStatus','err','Lägg till minst ett fält.');
  const f = {
    id: aktivtId || 'f_' + Date.now(),
    titel, desc: document.getElementById('fDesc').value.trim(),
    webhook: document.getElementById('fWebhook').value.trim(),
    fält: [...fält], skapad: new Date().toLocaleDateString('sv-SE')
  };
  aktivtId = f.id;
  const sparade = hämta();
  const idx = sparade.findIndex(x=>x.id===f.id);
  if (idx>=0) sparade[idx]=f; else sparade.push(f);
  localStorage.setItem('tnFormulär', JSON.stringify(sparade));
  visa('byggStatus','ok','✓ Sparat!');
  return f;
}

function sparaOchForhand() {
  const f = sparaFormulär();
  if (f) visaFormulär(f);
}

function hämta() {
  try { return JSON.parse(localStorage.getItem('tnFormulär')||'[]'); } catch { return []; }
}

function renderSparade() {
  const lista = document.getElementById('sparadeLista');
  const sparade = hämta();
  if (sparade.length===0) { lista.innerHTML='<div class="empty-state">Inga sparade formulär</div>'; return; }
  lista.innerHTML = sparade.map(f=>`
    <div class="saved-item" onclick="laddaFormulär('${f.id}')">
      <span class="saved-name">${f.titel}</span>
      <span class="saved-meta">${f.fält.length} fält · ${f.skapad}</span>
      <button class="btn btn-outline" style="padding:6px 14px;font-size:0.75rem" onclick="event.stopPropagation();visaFormulärById('${f.id}')">Öppna</button>
    </div>
  `).join('');
}

function laddaFormulär(id) {
  const f = hämta().find(x=>x.id===id);
  if (!f) return;
  aktivtId = f.id;
  document.getElementById('fTitel').value = f.titel;
  document.getElementById('fDesc').value = f.desc||'';
  document.getElementById('fWebhook').value = f.webhook||'';
  fält = f.fält.map(x=>({...x}));
  renderFält();
  byttab('bygg');
}

function visaFormulärById(id) {
  const f = hämta().find(x=>x.id===id);
  if (f) visaFormulär(f);
}

function visaFormulär(formulär) {
  const v = document.getElementById('formView');
  let html = `
    <div class="form-view-title">${formulär.titel}</div>
    ${formulär.desc ? `<div class="form-view-desc">${formulär.desc}</div>` : ''}
    <div id="fvSuccess" class="success-msg" style="display:none">
      <h2>✓ Tack!</h2><p>Din anmälan är mottagen.</p>
    </div>
    <div id="fvContent">
  `;
  formulär.fält.forEach((f,i) => {
    html += `<div class="fv-field"><label>${f.namn}</label>`;
    if (f.typ==='text') html += `<input type="text" id="fv_${i}" />`;
    else if (f.typ==='email') html += `<input type="email" id="fv_${i}" />`;
    else if (f.typ==='tel') html += `<input type="tel" id="fv_${i}" />`;
    else if (f.typ==='date') html += `<input type="date" id="fv_${i}" />`;
    else if (f.typ==='textarea') html += `<textarea id="fv_${i}"></textarea>`;
    else if (f.typ==='radio') {
      html += `<div class="radio-group">` + f.options.map((o,j)=>`
        <div class="radio-opt">
          <input type="radio" name="fv_${i}" id="fv_${i}_${j}" value="${o}">
          <label for="fv_${i}_${j}">${o}</label>
        </div>`).join('') + `</div>`;
    } else if (f.typ==='checkbox') {
      html += `<div class="radio-group">` + f.options.map((o,j)=>`
        <div class="radio-opt">
          <input type="checkbox" id="fv_${i}_${j}" value="${o}">
          <label for="fv_${i}_${j}">${o}</label>
        </div>`).join('') + `</div>`;
    }
    html += `</div>`;
  });
  html += `
    <div class="submit-wrap">
      <button class="submit-btn" onclick="skickaFormulär('${formulär.id}')">Skicka anmälan</button>
      <div id="fvStatus" class="status"></div>
    </div></div>`;
  v.innerHTML = html;

  const shareCard = document.getElementById('shareCard');
  shareCard.style.display = 'block';
  const url = location.origin + location.pathname + '?form=' + formulär.id;
  document.getElementById('shareUrl').value = url;

  document.getElementById('tabForhand').style.display = 'block';
  byttab('forhand');
}

async function skickaFormulär(id) {
  const formulär = hämta().find(f=>f.id===id);
  if (!formulär) return;
  const data = formulär.fält.map((f,i) => {
    let value = '';
    if (f.typ==='radio') {
      const el = document.querySelector(`input[name="fv_${i}"]:checked`);
      value = el ? el.value : '';
    } else if (f.typ==='checkbox') {
      value = [...document.querySelectorAll(`input[id^="fv_${i}_"]:checked`)].map(e=>e.value).join(', ');
    } else {
      value = document.getElementById('fv_'+i)?.value || '';
    }
    return { label: f.namn, value };
  });

  if (formulär.webhook) {
    try {
      await fetch(formulär.webhook, {
        method: 'POST',
        headers: {'Content-Type':'text/plain;charset=UTF-8'},
        body: JSON.stringify({ data })
      });
    } catch(e) { console.log(e); }
  }

  document.getElementById('fvContent').style.display = 'none';
  document.getElementById('fvSuccess').style.display = 'block';
}

function kopiera() {
  const url = document.getElementById('shareUrl').value;
  navigator.clipboard.writeText(url).then(() => visa('kopieraStatus','ok','✓ Kopierat!')).catch(() => {
    document.getElementById('shareUrl').select();
    document.execCommand('copy');
    visa('kopieraStatus','ok','✓ Kopierat!');
  });
}

function byttab(tab) {
  ['bygg','sparade','forhand'].forEach((t,i) => {
    document.querySelectorAll('.tab')[i].classList.toggle('active', t===tab);
    document.getElementById('panel-'+t).classList.toggle('active', t===tab);
  });
  if (tab==='sparade') renderSparade();
}

function visa(id, typ, text) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'status ' + typ;
  el.textContent = text;
  setTimeout(() => { if(el) el.className='status'; }, 4000);
}

const params = new URLSearchParams(location.search);
if (params.get('form')) visaFormulärById(params.get('form'));
</script>
</body>
</html>
