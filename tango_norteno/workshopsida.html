<script>
function renderaFormular(data) {
  const container = document.getElementById('deltagarFaltContainer');
  const falt = JSON.parse(data.deltagarFalt || '[]');
  window._deltagarFaltLayout = falt;
  
  container.innerHTML = falt.map((f, i) => {
    let inputHtml = '';
    if (f.typ === 'select') {
      const opts = f.options.split(',').map(o => o.trim());
      inputHtml = `<select id="deltFalt_${i}">${opts.map(o => `<option value="${o}">${o}</option>`).join('')}</select>`;
    } else if (f.typ === 'radio') {
      const opts = f.options.split(',').map(o => o.trim());
      inputHtml = opts.map(o => `<label style="display:block"><input type="radio" name="deltFalt_${i}" value="${o}"> ${o}</label>`).join('');
    } else if (f.typ === 'checkbox') {
      inputHtml = `<input type="checkbox" id="deltFalt_${i}"> ${f.namn}`;
    } else {
      inputHtml = `<input type="${f.typ}" id="deltFalt_${i}" ${f.krav ? 'required' : ''}>`;
    }
    
    return `<div class="input-group"><label>${f.namn}</label>${inputHtml}</div>`;
  }).join('');
}

// Vid inskickning av workshop-anmälan:
function hamtaDeltagarData() {
  return window._deltagarFaltLayout.map((f, i) => {
    let val = '';
    if (f.typ === 'radio') {
      const selected = document.querySelector(`input[name="deltFalt_${i}"]:checked`);
      val = selected ? selected.value : '';
    } else if (f.typ === 'checkbox') {
      val = document.getElementById('deltFalt_' + i).checked ? 'Ja' : 'Nej';
    } else {
      val = document.getElementById('deltFalt_' + i).value;
    }
    return { label: f.namn, value: val };
  });
}
</script>
