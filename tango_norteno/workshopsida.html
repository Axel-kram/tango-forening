<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workshopanmälan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --brown:      #3B2314;
      --brown-mid:  #5C3720;
      --brown-light:#8B5E3C;
      --beige:      #C9A87C;
      --cream:      #F5EFE6;
      --cream-dark: #EDE4D5;
      --text:       #2A1A0E;
      --text-muted: #7A5C44;
      --border:     #D4B896;
      --white:      #FDFAF6;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; font-weight: 300; background: var(--cream); color: var(--text); min-height: 100vh; }

    .hero { background: var(--brown); color: var(--white); padding: 4rem 1rem; text-align: center; }
    .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: 3rem; margin-bottom: 1rem; }
    .container { max-width: 700px; margin: -2rem auto 4rem; padding: 0 1rem; position: relative; z-index: 2; }
    .card { background: var(--white); padding: 2.5rem; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(59,35,20,0.08); margin-bottom: 2rem; }
    
    h2, h3 { font-family: 'Cormorant Garamond', serif; color: var(--brown); margin-bottom: 1.5rem; }
    .desc { color: var(--text-muted); line-height: 1.6; margin-bottom: 2rem; white-space: pre-wrap; }

    .input-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--brown-mid); }
    input[type="text"], input[type="email"], input[type="tel"], select {
      width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--white); font-family: inherit; font-size: 1rem; transition: border-color 0.3s;
    }
    input:focus, select:focus { outline: none; border-color: var(--brown-light); }

    .workshop-row { background: var(--cream-dark); padding: 1.5rem; border-radius: 10px; margin-bottom: 1rem; border: 1px solid var(--border); }
    .workshop-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .workshop-header h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--brown); }

    .radio-group { display: flex; gap: 15px; margin-bottom: 1rem; }
    .radio-option { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .radio-option input { cursor: pointer; accent-color: var(--brown); }

    .btn { display: inline-block; width: 100%; padding: 14px; background: var(--brown); color: var(--white); border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 500; cursor: pointer; transition: all 0.3s; text-align: center; font-family: 'Jost', sans-serif; }
    .btn:hover { background: var(--brown-mid); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,35,20,0.15); }
    .btn:disabled { background: var(--border); cursor: not-allowed; }

    .status-msg { margin-top: 1rem; padding: 1rem; border-radius: 8px; display: none; text-align: center; }
    .ok-msg { display: block; background: #e8f5e9; color: #2e7d32; }
    .err-msg { display: block; background: #ffebee; color: #c62828; }
  </style>
</head>
<body>

  <div class="hero">
    <h1 id="evTitel">Laddar...</h1>
  </div>

  <div class="container">
    <div class="card">
      <div id="evDesc" class="desc"></div>
      
      <form id="anmalanForm">
        <h3>Deltagaruppgifter</h3>
        <div id="deltagarFaltContainer">
          </div>

        <h3 style="margin-top: 2rem;">Välj dina workshops</h3>
        <div id="workshopContainer">
          </div>

        <button type="submit" id="submitBtn" class="btn">Skicka anmälan</button>
        <div id="status" class="status-msg"></div>
      </form>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const evId = urlParams.get('event');
    let evData = null;

    window.addEventListener('DOMContentLoaded', async () => {
      if (!evId) { visaStatus('err-msg', 'Event-ID saknas.'); return; }
      const adminSettings = JSON.parse(localStorage.getItem('tango_admin_settings') || '{}');
      const fetchUrl = adminSettings.urlHamtaWorkshop + '?id=' + evId;

      try {
        const res = await fetch(fetchUrl);
        evData = await res.json();
        if (evData.error) throw new Error(evData.error);

        document.title = evData.titel;
        document.getElementById('evTitel').textContent = evData.titel;
        document.getElementById('evDesc').textContent = evData.desc;

        renderaFormular(evData);
        renderaWorkshops(evData.workshops);

      } catch(e) { visaStatus('err-msg', 'Kunde inte hämta eventet.'); }
    });

    function renderaFormular(data) {
      const container = document.getElementById('deltagarFaltContainer');
      const faltLista = JSON.parse(data.deltagarFalt || '[]');
      window._deltagarFaltLayout = faltLista;
      
      container.innerHTML = faltLista.map((f, i) => {
        let inputHtml = '';
        const label = `<label>${f.namn}</label>`;
        
        if (f.typ === 'select') {
          const opts = f.options.split(',').map(o => o.trim());
          inputHtml = `<select id="deltFalt_${i}" required>${opts.map(o => `<option value="${o}">${o}</option>`).join('')}</select>`;
        } else if (f.typ === 'radio') {
          const opts = f.options.split(',').map(o => o.trim());
          inputHtml = `<div class="radio-group">` + opts.map(o => `
            <label class="radio-option">
              <input type="radio" name="deltFalt_${i}" value="${o}" required> ${o}
            </label>
          `).join('') + `</div>`;
        } else if (f.typ === 'checkbox') {
          return `<div class="input-group">
            <label style="display:flex; align-items:center; gap:10px; font-weight:400; cursor:pointer;">
              <input type="checkbox" id="deltFalt_${i}" style="width:auto; margin:0;"> ${f.namn}
            </label>
          </div>`;
        } else {
          inputHtml = `<input type="${f.typ}" id="deltFalt_${i}" required>`;
        }
        
        return `<div class="input-group">${label}${inputHtml}</div>`;
      }).join('');
    }

    function renderaWorkshops(workshops) {
      const container = document.getElementById('workshopContainer');
      if (!workshops || workshops.length === 0) {
        container.innerHTML = '<p>Inga klasser valbara.</p>';
        return;
      }
      
      container.innerHTML = workshops.map((ws, i) => `
        <div class="workshop-row">
          <div class="workshop-header">
            <h4>${ws.namn}</h4>
          </div>
          
          <label>Din roll</label>
          <div class="radio-group">
            <label class="radio-option"><input type="radio" name="roll_${i}" value="Förare" required> Förare</label>
            <label class="radio-option"><input type="radio" name="roll_${i}" value="Följare" required> Följare</label>
            <label class="radio-option"><input type="radio" name="roll_${i}" value="Båda" required> Båda</label>
          </div>

          <label>Har du partner?</label>
          <div class="radio-group">
            <label class="radio-option"><input type="radio" name="partner_${i}" value="nej" checked onchange="togglePartner(${i}, false)"> Nej</label>
            <label class="radio-option"><input type="radio" name="partner_${i}" value="ja" onchange="togglePartner(${i}, true)"> Ja</label>
          </div>

          <div id="partnerInfo_${i}" style="display:none; margin-top:10px;">
            <label>Partners telefonnummer</label>
            <input type="tel" id="partnerTel_${i}" placeholder="För matchning">
          </div>
        </div>
      `).join('');
    }

    function togglePartner(idx, show) {
      document.getElementById('partnerInfo_' + idx).style.display = show ? 'block' : 'none';
    }

    document.getElementById('anmalanForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Skickar...';

      // 1. Hämta deltagardata från de dynamiska fälten
      const deltagarData = window._deltagarFaltLayout.map((f, i) => {
        let val = '';
        if (f.typ === 'radio') {
          const selected = document.querySelector(`input[name="deltFalt_${i}"]:checked`);
          val = selected ? selected.value : '';
        } else if (f.typ === 'checkbox') {
          val = document.getElementById('deltFalt_' + i).checked ? 'Ja' : 'Nej';
        } else {
          val = document.getElementById('deltFalt_' + i).value;
        }
        return { label: f.namn, value: val };
      });

      // 2. Hämta workshopval
      const wsData = evData.workshops.map((ws, i) => {
        const roll = document.querySelector(`input[name="roll_${i}"]:checked`).value;
        const harPartner = document.querySelector(`input[name="partner_${i}"]:checked`).value;
        const partnerTel = document.getElementById('partnerTel_' + i).value;
        return {
          workshop: ws.namn,
          roll: roll,
          partner: harPartner === 'ja' ? partnerTel : 'Ingen'
        };
      });

      const payload = {
        event_id: evId,
        event_titel: evData.titel,
        data: [
          ...deltagarData,
          ...wsData.flatMap(w => [
            { label: w.workshop + " (Roll)", value: w.roll },
            { label: w.workshop + " (Partner)", value: w.partner }
          ])
        ]
      };

      try {
        await fetch(evData.webhook_url, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(payload)
        });
        visaStatus('ok-msg', 'Tack för din anmälan!');
        btn.textContent = 'Skickat';
      } catch(e) {
        visaStatus('err-msg', 'Ett fel uppstod. Försök igen.');
        btn.disabled = false;
        btn.textContent = 'Skicka anmälan';
      }
    };

    function visaStatus(cls, msg) {
      const el = document.getElementById('status');
      el.className = 'status-msg ' + cls;
      el.textContent = msg;
    }
  </script>
</body>
</html>
