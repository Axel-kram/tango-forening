<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tango Norteño – Workshopbyggare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --brown: #3B2314; --brown-mid: #5C3720; --brown-light: #8B5E3C;
      --beige: #C9A87C; --cream: #F5EFE6; --cream-dark: #EDE4D5;
      --text: #2A1A0E; --text-muted: #7A5C44; --border: #D4B896; --white: #FDFAF6;
    }
    body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--text); padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { background: var(--white); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 2rem; }
    h1, h3 { font-family: 'Cormorant Garamond', serif; color: var(--brown); margin-bottom: 1rem; }
    .input-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--brown-mid); }
    input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--white); font-family: inherit; font-size: 1rem; }
    .btn { padding: 12px 24px; border-radius: 50px; border: none; cursor: pointer; font-weight: 500; transition: all 0.3s; }
    .btn-primary { background: var(--brown); color: var(--white); width: 100%; font-size: 1.1rem; }
    .btn-secondary { background: var(--beige); color: var(--brown); margin-top: 10px; }
    .btn-danger { background: #e74c3c; color: white; padding: 5px 10px; border-radius: 4px; }
    .field-row { background: var(--cream-dark); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); }
    .options-area { margin-top: 10px; padding-left: 20px; border-left: 2px solid var(--beige); }
    .status { margin-top: 10px; padding: 10px; border-radius: 8px; display: none; }
    .status.ok { display: block; background: #d4edda; color: #155724; }
    .status.err { display: block; background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Skapa Workshop-event</h1>
    
    <div class="card">
      <h3>Allmän info</h3>
      <div class="input-group">
        <label>Eventets namn</label>
        <input type="text" id="evTitel" placeholder="T.ex. Helgworkshop med Maria">
      </div>
      <div class="input-group">
        <label>Beskrivning</label>
        <textarea id="evDesc" rows="3"></textarea>
      </div>
      <div class="input-group">
        <label>Webhook URL (för anmälningar)</label>
        <input type="url" id="webhookUrl" placeholder="https://n8n.din-server.com/...">
      </div>
    </div>

    <div class="card">
      <h3>Deltagaruppgifter (Anpassade fält)</h3>
      <div id="deltagarFaltLista"></div>
      <button class="btn btn-secondary" onclick="laggTillFalt()">+ Lägg till fält (Tally-stil)</button>
    </div>

    <div class="card">
      <h3>Workshops / Klasser</h3>
      <div id="workshopLista"></div>
      <button class="btn btn-secondary" onclick="laggTillWorkshop()">+ Lägg till workshop</button>
    </div>

    <button class="btn btn-primary" onclick="sparaEvent()">Spara och generera länk</button>
    <div id="sparaStatus" class="status"></div>

    <div id="delaCard" class="card" style="display:none; margin-top:20px;">
      <h3>Eventet är skapat!</h3>
      <p>Kopiera länken nedan och dela den:</p>
      <input type="text" id="shareUrl" readonly style="margin: 10px 0;">
      <button class="btn btn-secondary" onclick="kopiera()">Kopiera länk</button>
      <div id="kopieraStatus" class="status"></div>
    </div>
  </div>

  <script>
    let deltagarFalt = [
      { namn: 'Namn', typ: 'text', krav: true, options: '' },
      { namn: 'E-post', typ: 'email', krav: true, options: '' }
    ];
    let workshops = [];

    function laggTillFalt() {
      deltagarFalt.push({ namn: '', typ: 'text', krav: false, options: '' });
      renderaFalt();
    }

    function renderaFalt() {
      const container = document.getElementById('deltagarFaltLista');
      container.innerHTML = deltagarFalt.map((f, i) => `
        <div class="field-row">
          <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
            <input type="text" placeholder="Fråga/Fältnamn" value="${f.namn}" onchange="uppdateraFalt(${i}, 'namn', this.value)" style="flex:2">
            <select onchange="uppdateraFalt(${i}, 'typ', this.value)" style="flex:1">
              <option value="text" ${f.typ==='text'?'selected':''}>Text</option>
              <option value="email" ${f.typ==='email'?'selected':''}>E-post</option>
              <option value="select" ${f.typ==='select'?'selected':''}>Rullista (1, 2, 3)</option>
              <option value="radio" ${f.typ==='radio'?'selected':''}>Flerval</option>
              <option value="checkbox" ${f.typ==='checkbox'?'selected':''}>Kryssruta</option>
            </select>
            <button class="btn-danger" onclick="taBortFalt(${i})">X</button>
          </div>
          ${(f.typ==='select' || f.typ==='radio') ? `
            <div class="options-area">
              <label style="font-size:0.8rem">Alternativ (separera med kommatecken):</label>
              <input type="text" placeholder="Val 1, Val 2, Val 3" value="${f.options || ''}" onchange="uppdateraFalt(${i}, 'options', this.value)">
            </div>
          ` : ''}
        </div>
      `).join('');
    }

    function uppdateraFalt(i, prop, val) { deltagarFalt[i][prop] = val; renderaFalt(); }
    function taBortFalt(i) { deltagarFalt.splice(i, 1); renderaFalt(); }

    function laggTillWorkshop() {
      workshops.push({ id: Date.now(), namn: '', max: 20 });
      renderaWorkshops();
    }

    function renderaWorkshops() {
      const container = document.getElementById('workshopLista');
      container.innerHTML = workshops.map((ws, i) => `
        <div class="field-row" style="display:flex; gap:10px;">
          <input type="text" placeholder="Workshopens namn" value="${ws.namn}" onchange="workshops[${i}].namn=this.value">
          <input type="number" placeholder="Max" value="${ws.max}" onchange="workshops[${i}].max=this.value" style="width:80px">
          <button class="btn-danger" onclick="workshops.splice(${i},1); renderaWorkshops()">X</button>
        </div>
      `).join('');
    }

    async function sparaEvent() {
      const titel = document.getElementById('evTitel').value.trim();
      const webhookUrl = document.getElementById('webhookUrl').value.trim();
      if(!titel || !webhookUrl) { alert("Fyll i titel och webhook!"); return; }
      
      const payload = {
        titel,
        desc: document.getElementById('evDesc').value.trim(),
        webhook_url: webhookUrl,
        deltagarFalt: JSON.stringify(deltagarFalt),
        workshops_json: JSON.stringify(workshops)
      };

      const adminSettings = JSON.parse(localStorage.getItem('tango_admin_settings') || '{}');
      const sparaUrl = adminSettings.urlSparaWorkshop;

      try {
        const res = await fetch(sparaUrl, { method:'POST', body: JSON.stringify(payload) });
        const data = await res.json();
        const url = location.origin + location.pathname.replace('workshopsbyggare.html','') + 'workshopsida.html?event=' + data.id;
        document.getElementById('shareUrl').value = url;
        document.getElementById('delaCard').style.display = 'block';
      } catch(e) { alert("Fel vid sparande: " + e.message); }
    }

    function kopiera() {
      document.getElementById('shareUrl').select();
      document.execCommand('copy');
      alert("Länk kopierad!");
    }

    renderaFalt();
  </script>
</body>
</html>
