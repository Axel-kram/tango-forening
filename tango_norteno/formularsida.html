<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anmälan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --brown:      #3B2314;
      --brown-mid:  #5C3720;
      --brown-light:#8B5E3C;
      --beige:      #C9A87C;
      --cream:      #F5EFE6;
      --cream-dark: #EDE4D5;
      --text:       #2A1A0E;
      --text-muted: #7A5C44;
      --border:     #D4B896;
      --white:      #FDFAF6;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; font-weight: 300; background: var(--cream); color: var(--text); min-height: 100vh; }

    /* Tally-style: full-page centered hero */
    .hero {
      background: var(--brown);
      padding: 3.5rem 1.5rem 4rem;
      text-align: center;
      border-bottom: 3px solid var(--beige);
    }
    .hero-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--beige);
      margin-bottom: 1.5rem;
      opacity: 0.7;
    }
    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.15;
      margin-bottom: 0.9rem;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }
    .hero .desc {
      color: var(--beige);
      font-size: 0.95rem;
      max-width: 460px;
      margin: 0 auto;
      line-height: 1.6;
      opacity: 0.88;
    }

    .form-wrap { max-width: 560px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    /* Tally-style: each field is a section */
    .falt-block {
      margin-bottom: 1.8rem;
      animation: fadeUp 0.3s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .falt-block label {
      display: block;
      font-size: 1rem;
      font-weight: 500;
      color: var(--brown);
      margin-bottom: 0.5rem;
      letter-spacing: 0;
    }
    .falt-block .required-star { color: var(--brown-light); margin-left: 0.15rem; }
    input[type="text"], input[type="email"], input[type="tel"], input[type="number"],
    select, textarea {
      width: 100%;
      padding: 0.75rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      background: var(--white);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--brown-light);
      box-shadow: 0 0 0 3px rgba(139,94,60,0.12);
    }

    /* Radio / checkbox Tally style */
    .choice-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .choice-item {
      display: flex; align-items: center; gap: 0.75rem;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 5px;
      padding: 0.7rem 1rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .choice-item:hover { border-color: var(--brown-light); background: var(--cream-dark); }
    .choice-item input { width: auto; margin: 0; accent-color: var(--brown); }
    .choice-item span { font-size: 0.92rem; }

    .checkbox-item {
      display: flex; align-items: center; gap: 0.75rem;
      cursor: pointer;
      font-size: 0.92rem;
    }
    .checkbox-item input { width: auto; accent-color: var(--brown); }

    .submit-btn {
      width: 100%;
      background: var(--brown);
      color: var(--cream);
      border: none;
      padding: 0.9rem 1.5rem;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: var(--brown-mid); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .status-msg {
      margin-top: 1.2rem;
      text-align: center;
      font-size: 0.9rem;
      padding: 1rem;
      border-radius: 6px;
    }
    .ok-msg  { background: #e8f3ec; color: #2d6b3e; border: 1px solid #b8ddc5; }
    .err-msg { background: #fdecea; color: #a0302a; border: 1px solid #f0b8b3; }

    #laddning { text-align: center; padding: 5rem 1rem; color: var(--text-muted); }
    #ejHittat { text-align: center; padding: 5rem 1rem; }
    #ejHittat h2 { font-family:'Cormorant Garamond',serif; color: var(--brown); margin-bottom:0.8rem; }
  </style>
</head>
<body>

  <div id="laddning">
    <p style="font-size:0.9rem;">Laddar formulär...</p>
  </div>

  <div id="innehall" style="display:none">
    <div class="hero">
      <div class="hero-logo">Tango Norteño</div>
      <h1 id="formTitel">Anmälan</h1>
      <p id="formDesc" class="desc"></p>
    </div>
    <div class="form-wrap">
      <form id="anmalanForm" onsubmit="skickaAnmalan(event)">
        <div id="faltContainer"></div>
        <button type="submit" id="skickaBtn" class="submit-btn">Skicka anmälan</button>
      </form>
      <div id="formStatus" style="display:none"></div>
    </div>
  </div>

  <div id="ejHittat" style="display:none">
    <h2>Formuläret hittades inte</h2>
    <p>Kontrollera att länken är korrekt.</p>
  </div>

  <!-- ÄNDRA DENNA URL till din hamta_formular-webhook i n8n -->
  <script>
    const HAMTA_FORMULAR_URL = 'HAMTA_FORMULAR_WEBHOOK_URL';

    let formData = null, formId = null;

    async function init() {
      const params = new URLSearchParams(location.search);
      formId = params.get('form');
      if (!formId) { visaEjHittat(); return; }
      try {
        const res = await fetch(HAMTA_FORMULAR_URL + '?id=' + formId);
        const data = await res.json();
        if (data.error || !data.titel) { visaEjHittat(); return; }
        formData = data;
        visaFormular(data);
      } catch(e) { visaEjHittat(); }
    }

    function visaEjHittat() {
      document.getElementById('laddning').style.display = 'none';
      document.getElementById('ejHittat').style.display = 'block';
    }

    function visaFormular(data) {
      document.getElementById('laddning').style.display = 'none';
      document.getElementById('innehall').style.display = 'block';
      document.getElementById('formTitel').textContent = data.titel;
      const desc = data.desc || '';
      const descEl = document.getElementById('formDesc');
      descEl.textContent = desc;
      if (!desc) descEl.style.display = 'none';

      const falt = typeof data.falt_json === 'string' ? JSON.parse(data.falt_json) : (data.falt || []);
      const container = document.getElementById('faltContainer');
      container.innerHTML = '';

      falt.forEach((f, i) => {
        const block = document.createElement('div');
        block.className = 'falt-block';
        block.style.animationDelay = (i * 0.04) + 's';

        const kravSpan = f.krav ? '<span class="required-star">*</span>' : '';

        if (f.typ === 'textarea') {
          block.innerHTML = `
            <label for="falt_${i}">${f.namn}${kravSpan}</label>
            <textarea id="falt_${i}" name="${f.namn}" rows="4" ${f.krav ? 'required' : ''}></textarea>`;
        } else if (f.typ === 'select') {
          const opts = (f.alternativ || []).map(a => `<option value="${a}">${a}</option>`).join('');
          block.innerHTML = `
            <label for="falt_${i}">${f.namn}${kravSpan}</label>
            <select id="falt_${i}" name="${f.namn}" ${f.krav ? 'required' : ''}>
              <option value="">– Välj –</option>${opts}
            </select>`;
        } else if (f.typ === 'radio') {
          const alts = (f.alternativ || []).map(a => `
            <label class="choice-item">
              <input type="radio" name="falt_${i}" value="${a}" ${f.krav ? 'required' : ''} />
              <span>${a}</span>
            </label>`).join('');
          block.innerHTML = `<label>${f.namn}${kravSpan}</label><div class="choice-list">${alts}</div>`;
        } else if (f.typ === 'checkbox') {
          block.innerHTML = `
            <label class="checkbox-item">
              <input type="checkbox" id="falt_${i}" name="${f.namn}" value="ja" />
              <span>${f.namn}${kravSpan}</span>
            </label>`;
        } else {
          block.innerHTML = `
            <label for="falt_${i}">${f.namn}${kravSpan}</label>
            <input type="${f.typ}" id="falt_${i}" name="${f.namn}" ${f.krav ? 'required' : ''} />`;
        }
        container.appendChild(block);
      });

      window._faltLista = falt;
    }

    async function skickaAnmalan(e) {
      e.preventDefault();
      const btn = document.getElementById('skickaBtn');
      btn.disabled = true; btn.textContent = 'Skickar...';

      const falt = window._faltLista || [];
      const dataArr = falt.map((f, i) => {
        let value = '';
        if (f.typ === 'radio') {
          const checked = document.querySelector(`input[name="falt_${i}"]:checked`);
          value = checked ? checked.value : '';
        } else if (f.typ === 'checkbox') {
          const el = document.getElementById('falt_' + i);
          value = el && el.checked ? 'ja' : 'nej';
        } else {
          const el = document.getElementById('falt_' + i) || document.querySelector(`[name="${f.namn}"]`);
          value = el ? el.value : '';
        }
        return { label: f.namn, value };
      });

      try {
        await fetch(formData.webhook_url, {
          method: 'POST',
          headers: {'Content-Type':'text/plain;charset=UTF-8'},
          body: JSON.stringify({ form_id: formId, data: dataArr })
        });
        visaStatus('ok-msg', 'Tack for din anmalan! Vi hör av oss.');
        document.getElementById('anmalanForm').reset();
        btn.textContent = 'Skickat';
      } catch(e) {
        visaStatus('err-msg', 'Nagot gick fel. Forsok igen eller kontakta oss.');
        btn.disabled = false; btn.textContent = 'Skicka anmälan';
      }
    }

    function visaStatus(cls, msg) {
      const el = document.getElementById('formStatus');
      el.textContent = msg; el.className = 'status-msg ' + cls; el.style.display = 'block';
    }

    init();
  </script>
</body>
</html>
