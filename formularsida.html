<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tango Norteño — Anmälan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f5f0e8;--surface:#ede6d6;--surface2:#e0d5c0;--border:#c4b49a;--brown:#4a2c1a;--brown-mid:#7a4a2e;--brown-lt:#a67c5b;--cream:#faf6ee;--text:#2e1a0e;--text-lt:#6b4c35;--accent:#8b3a1f;--success:#4a7c59;--danger:#8b1f1f;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:2.5rem 1rem;}
  .brand{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--brown-lt);letter-spacing:0.06em;margin-bottom:2rem;text-align:center;}
  .brand span{font-style:italic;}
  .card{background:var(--cream);border:1px solid var(--border);border-radius:12px;padding:2.5rem;width:100%;max-width:580px;box-shadow:0 4px 24px rgba(74,44,26,0.12);}
  .form-title{font-family:'Playfair Display',serif;font-size:2rem;color:var(--brown);margin-bottom:0.5rem;line-height:1.2;}
  .form-desc{color:var(--text-lt);font-size:0.95rem;margin-bottom:1.5rem;line-height:1.6;}
  .max-badge{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:0.8rem;color:var(--text-lt);padding:0.25rem 0.9rem;margin-bottom:1.5rem;}
  .field{margin-bottom:1.2rem;}
  .field label{display:block;font-size:0.82rem;font-weight:700;color:var(--brown-mid);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.04em;}
  .field .req{color:var(--accent);}
  .field input[type=text],.field input[type=email],.field input[type=tel],.field textarea,.field select{
    width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;
    padding:0.65rem 0.9rem;font-family:'Lato',sans-serif;font-size:0.95rem;color:var(--text);
    transition:border-color 0.2s;
  }
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--brown-mid);}
  .field textarea{resize:vertical;min-height:90px;}
  .radio-group,.check-group{display:flex;flex-direction:column;gap:0.5rem;}
  .radio-group label,.check-group label{font-size:0.92rem;font-weight:400;text-transform:none;letter-spacing:0;color:var(--text);display:flex;align-items:center;gap:0.6rem;cursor:pointer;}
  .field-error{color:var(--danger);font-size:0.8rem;margin-top:0.3rem;display:none;}
  .field.invalid input,.field.invalid textarea,.field.invalid select{border-color:var(--danger);}
  .field.invalid .field-error{display:block;}
  .submit-btn{background:var(--brown);color:var(--cream);border:none;border-radius:6px;padding:0.85rem 2.5rem;font-family:'Lato',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:0.05em;transition:filter 0.2s,transform 0.1s;width:100%;margin-top:0.5rem;}
  .submit-btn:hover{filter:brightness(1.1);}
  .submit-btn:active{transform:scale(0.99);}
  .submit-btn:disabled{opacity:0.6;cursor:not-allowed;}
  const hamtaUrl = 'https://DIN-N8N-URL/webhook/hamta_formular';
  .msg .icon{font-size:2.5rem;margin-bottom:0.7rem;}
  .msg h2{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--brown);margin-bottom:0.5rem;}
  .msg p{color:var(--text-lt);font-size:0.95rem;}
  .spinner{display:flex;flex-direction:column;align-items:center;gap:1rem;padding:3rem 0;}
  .spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--brown-mid);border-radius:50%;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .full-notice{background:#f5e0d0;border:1px solid #d4956e;border-radius:8px;padding:1.2rem;text-align:center;margin-bottom:1.5rem;}
  .full-notice h3{color:var(--accent);font-family:'Playfair Display',serif;margin-bottom:0.3rem;}
  .full-notice p{color:var(--text-lt);font-size:0.88rem;}
</style>
</head>
<body>

<div class="brand">Tango <span>Norteño</span></div>
<div class="card" id="mainCard">
  <div class="spinner"><div class="spin"></div><p style="color:var(--text-lt);">Laddar formulär...</p></div>
</div>

<script>
const params = new URLSearchParams(location.search);
const formId = params.get('form');
let formularData = null;
let antalAnmalda = 0;

async function laddaFormular() {
  const card = document.getElementById('mainCard');
  if (!formId) { visaFel('Inget formulär-ID angivet.'); return; }
  const hamtaUrl = localStorage.getItem('urlHamtaFormular');
  if (!hamtaUrl) { visaFel('Systemkonfiguration saknas. Kontakta administratören.'); return; }
  try {
    const res = await fetch(hamtaUrl + '?id=' + formId);
    const data = await res.json();
    if (data.error || !data.titel) { visaFel('Formuläret hittades inte.'); return; }
    formularData = data;
    antalAnmalda = parseInt(data.anmalningar) || 0;
    visaFormular(data);
  } catch(e) {
    visaFel('Kunde inte ladda formuläret. Försök igen.');
  }
}

function visaFormular(f) {
  const falt = typeof f.falt_json === 'string' ? JSON.parse(f.falt_json) : (f.falt || []);
  const max = f.max ? parseInt(f.max) : null;
  const full = max && antalAnmalda >= max;
  let html = `<div class="form-title">${escHtml(f.titel)}</div>`;
  if (f.desc) html += `<div class="form-desc">${escHtml(f.desc)}</div>`;
  if (max) html += `<div class="max-badge">Platser kvar: ${Math.max(0, max - antalAnmalda)} / ${max}</div>`;
  if (full) {
    html += `<div class="full-notice"><h3>Tyvärr — fullt!</h3><p>Det finns inga lediga platser på detta tillfälle.</p></div>`;
    document.getElementById('mainCard').innerHTML = html;
    return;
  }
  falt.forEach(f => {
    const req = f.obligatorisk ? '<span class="req"> *</span>' : '';
    html += `<div class="field" id="flt_${f.id}"><label>${escHtml(f.namn)}${req}</label>`;
    if (f.typ === 'text') html += `<input type="text" name="${f.id}" placeholder="${escHtml(f.placeholder||'')}">`;
    else if (f.typ === 'email') html += `<input type="email" name="${f.id}" placeholder="${escHtml(f.placeholder||'')}">`;
    else if (f.typ === 'tel') html += `<input type="tel" name="${f.id}" placeholder="${escHtml(f.placeholder||'')}">`;
    else if (f.typ === 'textarea') html += `<textarea name="${f.id}" placeholder="${escHtml(f.placeholder||'')}"></textarea>`;
    else if (f.typ === 'checkbox') html += `<div class="check-group"><label><input type="checkbox" name="${f.id}"> ${escHtml(f.namn)}</label></div>`;
    else if (f.typ === 'radio') {
      const alts = (f.alternativ||'').split('\n').filter(a=>a.trim());
      html += `<div class="radio-group">${alts.map(a=>`<label><input type="radio" name="${f.id}" value="${escHtml(a.trim())}"> ${escHtml(a.trim())}</label>`).join('')}</div>`;
    } else if (f.typ === 'select') {
      const alts = (f.alternativ||'').split('\n').filter(a=>a.trim());
      html += `<select name="${f.id}"><option value="">Välj...</option>${alts.map(a=>`<option value="${escHtml(a.trim())}">${escHtml(a.trim())}</option>`).join('')}</select>`;
    }
    html += `<div class="field-error">Detta fält är obligatoriskt.</div></div>`;
  });
  html += `<button class="submit-btn" onclick="skickaAnmalan()">Skicka anmälan</button>`;
  document.getElementById('mainCard').innerHTML = html;
}

async function skickaAnmalan() {
  const falt = typeof formularData.falt_json === 'string' ? JSON.parse(formularData.falt_json) : (formularData.falt || []);
  const webhookUrl = formularData.webhook_url;
  if (!webhookUrl) { alert('Systemfel: webhook-URL saknas.'); return; }

  let valid = true;
  const data = [];
  falt.forEach(f => {
    const container = document.getElementById('flt_' + f.id);
    let value = '';
    if (f.typ === 'radio') {
      const checked = document.querySelector(`input[name="${f.id}"]:checked`);
      value = checked ? checked.value : '';
    } else if (f.typ === 'checkbox') {
      const cb = document.querySelector(`input[name="${f.id}"]`);
      value = cb && cb.checked ? 'Ja' : 'Nej';
    } else {
      const el = document.querySelector(`[name="${f.id}"]`);
      value = el ? el.value.trim() : '';
    }
    if (f.obligatorisk && !value) { container?.classList.add('invalid'); valid = false; }
    else { container?.classList.remove('invalid'); }
    data.push({ label: f.namn, value });
  });
  if (!valid) return;

  const btn = document.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = 'Skickar...';
  try {
    const payload = { form_id: formId, data };
    await fetch(webhookUrl, { method:'POST', headers:{'Content-Type':'text/plain;charset=UTF-8'}, body: JSON.stringify(payload) });
    document.getElementById('mainCard').innerHTML = `
      <div class="msg">
        <div class="icon">✦</div>
        <h2>Tack för din anmälan!</h2>
        <p>Vi återkommer med bekräftelse.</p>
      </div>`;
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Skicka anmälan';
    alert('Fel vid skickning. Försök igen.');
  }
}

function visaFel(msg) {
  document.getElementById('mainCard').innerHTML = `<div class="msg"><div class="icon">✦</div><h2>Formuläret hittades inte</h2><p>${msg}</p></div>`;
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

laddaFormular();
</script>
</body>
</html>
