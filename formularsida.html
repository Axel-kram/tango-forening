<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tango Norteño – Anmälan</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');
:root {
  --bg: #f5f0e8;
  --card: #fdf9f3;
  --border: #ddd5c4;
  --brown: #5c3d2e;
  --brown-light: #7a5444;
  --brown-dark: #3a2318;
  --text: #2e1f14;
  --muted: #8a7060;
  --danger: #9b2335;
  --success: #3a6b45;
  --off-white: #f9f5ef;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 40px 20px;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c4b49a' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
header { text-align: center; margin-bottom: 40px; }
.logo { width: 60px; height: 60px; object-fit: contain; margin-bottom: 10px; border-radius: 50%; border: 2px solid var(--border); }
header h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--brown-dark); }
header p { color: var(--muted); margin-top: 6px; font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; }
.container { max-width: 560px; margin: 0 auto; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 32px; box-shadow: 0 2px 12px rgba(60,35,20,0.07); }
.form-title { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--brown-dark); margin-bottom: 6px; text-align: center; }
.form-desc { color: var(--muted); font-size: 0.88rem; text-align: center; margin-bottom: 32px; line-height: 1.6; }
.fv-field { margin-bottom: 18px; }
.fv-field label { display: block; font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 7px; }
.fv-field input[type=text],
.fv-field input[type=email],
.fv-field input[type=tel],
.fv-field input[type=date],
.fv-field textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px 14px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.fv-field input:focus, .fv-field textarea:focus { border-color: var(--brown); }
.fv-field textarea { resize: vertical; min-height: 80px; }
.radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
.radio-opt input { display: none; }
.radio-opt label { display: block; padding: 9px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; color: var(--text); }
.radio-opt input:checked + label { background: var(--brown); border-color: var(--brown); color: var(--off-white); font-weight: 500; }
.radio-opt label:hover { border-color: var(--brown-light); }
.submit-btn { width: 100%; padding: 14px; background: var(--brown); color: var(--off-white); border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500; cursor: pointer; letter-spacing: 0.04em; transition: background 0.2s; margin-top: 8px; }
.submit-btn:hover { background: var(--brown-dark); }
.status { font-size: 0.85rem; padding: 10px 14px; border-radius: 8px; margin-top: 12px; display: none; }
.status.ok { background: rgba(58,107,69,0.1); border: 1px solid rgba(58,107,69,0.25); color: var(--success); display: block; }
.status.err { background: rgba(155,35,53,0.1); border: 1px solid rgba(155,35,53,0.25); color: var(--danger); display: block; }
.success-msg { text-align: center; padding: 60px 20px; }
.success-msg h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--brown); margin-bottom: 12px; }
.success-msg p { color: var(--muted); font-size: 0.9rem; }
.success-icon { font-size: 3rem; margin-bottom: 16px; }
.not-found { text-align: center; padding: 80px 20px; }
.not-found h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--brown); margin-bottom: 12px; }
.not-found p { color: var(--muted); font-size: 0.88rem; }
</style>
</head>
<body>
<header>
  <img class="logo" src="https://www.tangonorteno.se/wp-content/uploads/2025/06/tn-logo.jpg" alt="Tango Norteño" onerror="this.style.display='none'">
  <h1>Tango Norteño</h1>
  <p>Umeå</p>
</header>
<div class="container">
  <div class="card" id="mainCard">
    <div id="formContainer"></div>
  </div>
</div>
<script>
function hämtaFormulär(id) {
  try {
    const alla = JSON.parse(localStorage.getItem('tnFormulär') || '[]');
    return alla.find(f => f.id === id) || null;
  } catch { return null; }
}

function visaEjHittat() {
  document.getElementById('formContainer').innerHTML = `
    <div class="not-found">
      <div style="font-size:2.5rem;margin-bottom:16px">🕊️</div>
      <h2>Formuläret hittades inte</h2>
      <p>Länken verkar inte stämma. Kontakta arrangören för rätt länk.</p>
    </div>
  `;
}

function visaFormulär(formulär) {
  let html = `
    <div class="form-title">${formulär.titel}</div>
    ${formulär.desc ? `<div class="form-desc">${formulär.desc}</div>` : ''}
    <div id="fvSuccess" class="success-msg" style="display:none">
      <div class="success-icon">✨</div>
      <h2>Tack!</h2>
      <p>Din anmälan är mottagen. Vi återkommer med mer information.</p>
    </div>
    <div id="fvContent">
  `;
  formulär.fält.forEach((f, i) => {
    html += `<div class="fv-field"><label>${f.namn}</label>`;
    if (f.typ === 'text') html += `<input type="text" id="fv_${i}" />`;
    else if (f.typ === 'email') html += `<input type="email" id="fv_${i}" />`;
    else if (f.typ === 'tel') html += `<input type="tel" id="fv_${i}" />`;
    else if (f.typ === 'date') html += `<input type="date" id="fv_${i}" />`;
    else if (f.typ === 'textarea') html += `<textarea id="fv_${i}"></textarea>`;
    else if (f.typ === 'radio') {
      html += `<div class="radio-group">` + f.options.map((o, j) => `
        <div class="radio-opt">
          <input type="radio" name="fv_${i}" id="fv_${i}_${j}" value="${o}">
          <label for="fv_${i}_${j}">${o}</label>
        </div>`).join('') + `</div>`;
    } else if (f.typ === 'checkbox') {
      html += `<div class="radio-group">` + f.options.map((o, j) => `
        <div class="radio-opt">
          <input type="checkbox" id="fv_${i}_${j}" value="${o}">
          <label for="fv_${i}_${j}">${o}</label>
        </div>`).join('') + `</div>`;
    }
    html += `</div>`;
  });
  html += `
      <button class="submit-btn" onclick="skicka()">Skicka anmälan</button>
      <div id="fvStatus" class="status"></div>
    </div>
  `;
  document.getElementById('formContainer').innerHTML = html;
  window._aktivtFormulär = formulär;
}

async function skicka() {
  const formulär = window._aktivtFormulär;
  if (!formulär) return;
  const data = formulär.fält.map((f, i) => {
    let value = '';
    if (f.typ === 'radio') {
      const el = document.querySelector(`input[name="fv_${i}"]:checked`);
      value = el ? el.value : '';
    } else if (f.typ === 'checkbox') {
      value = [...document.querySelectorAll(`input[id^="fv_${i}_"]:checked`)].map(e => e.value).join(', ');
    } else {
      value = document.getElementById('fv_' + i)?.value || '';
    }
    return { label: f.namn, value };
  });
  if (formulär.webhook) {
    try {
      await fetch(formulär.webhook, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
        body: JSON.stringify({ data })
      });
    } catch(e) { console.log(e); }
  }
  document.getElementById('fvContent').style.display = 'none';
  document.getElementById('fvSuccess').style.display = 'block';
}

const params = new URLSearchParams(location.search);
const formId = params.get('form');
if (!formId) visaEjHittat();
else {
  const formulär = hämtaFormulär(formId);
  if (!formulär) visaEjHittat();
  else visaFormulär(formulär);
}
</script>
</body>
</html>
